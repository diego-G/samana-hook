<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0b1e"/>
      <stop offset="55%" stop-color="#150f2e"/>
      <stop offset="100%" stop-color="#1d1240"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="540" x2="1280" y2="540"/>
    <line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
  </g>

  <text x="84" y="92" font-family="Helvetica Neue, Arial, sans-serif" font-size="17" font-weight="600" fill="#fc72ff" letter-spacing="3">HOW IT WORKS</text>
  <text x="84" y="156" font-family="Helvetica Neue, Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff">The hook enforces the deal end to end</text>

  <!-- lifecycle: 5 phases -->
  <g font-family="Helvetica Neue, Arial, sans-serif">
    <!-- connector line -->
    <line x1="148" y1="262" x2="1132" y2="262" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="2"/>

    <!-- phase nodes -->
    <g text-anchor="middle">
      <circle cx="148" cy="262" r="9" fill="#fc72ff"/>
      <text x="148" y="308" font-size="22" font-weight="700" fill="#ffffff">Create</text>
      <text x="148" y="342" font-size="18" fill="#9b94b8">deposit − fee</text>
      <text x="148" y="368" font-size="18" fill="#9b94b8">= budget, in USDC</text>

      <circle cx="394" cy="262" r="9" fill="#fc72ff"/>
      <text x="394" y="308" font-size="22" font-weight="700" fill="#ffffff">Qualify</text>
      <text x="394" y="342" font-size="18" fill="#9b94b8">LP crosses minLiquidity:</text>
      <text x="394" y="368" font-size="18" fill="#9b94b8">reward reserved, TWAP entry</text>

      <circle cx="640" cy="262" r="9" fill="#fc72ff"/>
      <text x="640" y="308" font-size="22" font-weight="700" fill="#ffffff">Lockup</text>
      <text x="640" y="342" font-size="18" fill="#9b94b8">removals blocked,</text>
      <text x="640" y="368" font-size="18" fill="#9b94b8">LP bears IL</text>

      <circle cx="886" cy="262" r="9" fill="#fc72ff"/>
      <text x="886" y="308" font-size="22" font-weight="700" fill="#ffffff">Claim</text>
      <text x="886" y="342" font-size="18" fill="#9b94b8">base + IL payout</text>
      <text x="886" y="368" font-size="18" fill="#9b94b8">at TWAP exit</text>

      <circle cx="1132" cy="262" r="9" fill="#fc72ff"/>
      <text x="1132" y="308" font-size="22" font-weight="700" fill="#ffffff">Deactivate</text>
      <text x="1132" y="342" font-size="18" fill="#9b94b8">uncommitted budget</text>
      <text x="1132" y="368" font-size="18" fill="#9b94b8">refunded to creator</text>
    </g>
  </g>

  <!-- formula + properties -->
  <g font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#e8e6f2">
    <text x="84" y="492">·&#160; No external oracle: entry and exit prices are the pool's own 30-min TWAP</text>
    <text x="84" y="548">·&#160; Pull-payments: claims survive deactivation, no reentrancy in callbacks</text>
    <text x="84" y="604">·&#160; Creator cost is bounded: payouts capped by the budget, worst case known upfront</text>
  </g>

  <text x="84" y="688" font-family="Helvetica Neue, Arial, sans-serif" font-size="15" fill="#5e5880">SamanaHook · Uniswap v4</text>
  <text x="1196" y="688" font-family="Helvetica Neue, Arial, sans-serif" font-size="15" fill="#5e5880" text-anchor="end">4 / 7</text>
</svg>
